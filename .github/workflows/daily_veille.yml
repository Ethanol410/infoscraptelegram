name: Veille Claude Code

on:
  schedule:
    - cron: "0 6 * * *"  # 8h Paris en été (CEST = UTC+2)
    - cron: "0 7 * * *"  # 8h Paris en hiver (CET = UTC+1)
  workflow_dispatch: # Déclenchement manuel depuis l'onglet Actions

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run veille bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
          CACHE_GITHUB_TOKEN: ${{ secrets.CACHE_GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py
