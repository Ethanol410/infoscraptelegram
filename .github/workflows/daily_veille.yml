name: Veille Claude Code

on:
  schedule:
    - cron: "0 6 * * *"  # ~8h Paris (CEST=UTC+2) ou ~7h Paris (CET=UTC+1)
  workflow_dispatch: # Déclenchement manuel depuis l'onglet Actions

permissions:
  contents: read

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Guard — skip if run too late (GitHub delay protection)
        id: time_guard
        run: |
          hour=$(TZ='Europe/Paris' date +%-H)
          echo "Paris hour: $hour"
          if [ "$hour" -gt 11 ]; then
            echo "Too late (current: ${hour}h Paris) — skipping run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Running at ${hour}h Paris."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.time_guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        if: steps.time_guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.time_guard.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run veille bot
        if: steps.time_guard.outputs.skip != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
          CACHE_GITHUB_TOKEN: ${{ secrets.CACHE_GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Notify on failure
        if: failure() && steps.time_guard.outputs.skip != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          MSG="⚠️ La veille Claude Code a échoué — voir https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}" > /dev/null
          fi
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"${MSG}\"}" > /dev/null
          fi
